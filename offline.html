<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline - SM Shariah Scales</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
  }
  .card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 50px 40px;
    max-width: 400px;
    backdrop-filter: blur(20px);
  }
  .icon { font-size: 4rem; margin-bottom: 20px; }
  h1 { font-size: 1.5rem; color: #10b981; margin-bottom: 10px; }
  p { color: #94a3b8; line-height: 1.6; margin-bottom: 20px; }
  button {
    background: #059669;
    color: white;
    border: none;
    padding: 12px 30px;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📡</div>
  <h1>آپ آف لائن ہیں</h1>
  <p>انٹرنیٹ کنکشن دستیاب نہیں۔ براہ کرم انٹرنیٹ سے جڑ کر دوبارہ کوشش کریں۔</p>
  <p style="font-size:0.85rem">You are currently offline. Please check your internet connection.</p>
  <button onclick="location.reload()">دوبارہ کوشش کریں / Retry</button>
</div>
</body>
</html>

        currentLang = (currentLang === 'ur') ? 'en' : 'ur';
        const tr = translations[currentLang];
        document.getElementById('mainHtml').dir = (currentLang === 'ur') ? 'rtl' : 'ltr';
        document.getElementById('btnLang').innerText = tr.btnLang;
        document.getElementById('btnPdf').innerText = tr.btnPdf;
        document.getElementById('secTitle').innerText = tr.secTitle;
        document.getElementById('t1').innerText = tr.t1;
        document.getElementById('t2').innerText = tr.t2;
        document.getElementById('t3').innerText = tr.t3;
        document.getElementById('t4').innerText = tr.t4;
        document.getElementById('gt1').innerText = tr.gt1;
        document.getElementById('gt2').innerText = tr.gt2;
        document.getElementById('gt3').innerText = tr.gt3;
        document.getElementById('gt4').innerText = tr.gt4;
        document.getElementById('gt5').innerText = tr.gt5;
        document.getElementById('gt6').innerText = tr.gt6;
        document.getElementById('gt7').innerText = tr.gt7;
        document.getElementById('gt8').innerText = tr.gt8;
        for(let i=1; i<=36; i++){
            let el = document.getElementById('l'+i);
            if(el) el.innerText = tr.labels[i-1] + ":";
        }
        renderTable();
    }

    function renderTable() {
        const tr = translations[currentLang];
        document.getElementById('thRow').innerHTML = `<th>${tr.th[0]}</th><th>${tr.th[1]}</th>`;
        let h1 = ''; tr.tableRows.forEach(r => h1 += `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`);
        document.getElementById('tbody').innerHTML = h1;
        document.getElementById('thRow2').innerHTML = `<th>${tr.th2[0]}</th><th>${tr.th2[1]}</th>`;
        let h2 = ''; tr.table2Rows.forEach(r => h2 += `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`);
        document.getElementById('tbody2').innerHTML = h2;
    }

    function openTab(evt, tabId) {
        document.querySelectorAll(".tab-content").forEach(t => t.classList.add("hidden"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.getElementById(tabId).classList.remove("hidden");
        evt.currentTarget.classList.add("active");
    }

    function updateWeights(source) {
        let val = parseFloat(document.getElementById('w_'+source).value) || 0;
        let g = 0;
        if(source === 'gram') g = val;
        else if(source === 'kg') g = val * 1000;
        else if(source === 'tola') g = val * TOLA_G;
        else if(source === 'masha') g = val * (TOLA_G/12);
        else if(source === 'ratti') g = val * (TOLA_G/96);
        else if(source === 'dirham') g = val * DIRHAM_G;
        else if(source === 'dinar') g = val * DINAR_G;
        else if(source === 'istar') g = val * ISTAR_G;
        else if(source === 'danq') g = val * DANQ_G;
        else if(source === 'nash') g = val * (DIRHAM_G * 20);
        else if(source === 'oqia') g = val * 122.472;
        else if(source === 'ratl') g = val * RATL_G;
        else if(source === 'seer') g = val * SEER_G;
        else if(source === 'qirat') g = val * QIRAT_G;
        syncWeights(g);
    }

    function syncWeights(g) {
        document.getElementById('w_gram').value = fix(g);
        document.getElementById('w_kg').value = fix(g / 1000);
        document.getElementById('w_tola').value = fix(g / TOLA_G);
        document.getElementById('w_masha').value = fix(g / (TOLA_G/12));
        document.getElementById('w_ratti').value = fix(g / (TOLA_G/96));
        document.getElementById('w_dirham').value = fix(g / DIRHAM_G);
        document.getElementById('w_dinar').value = fix(g / DINAR_G);
        document.getElementById('w_istar').value = fix(g / ISTAR_G);
        document.getElementById('w_danq').value = fix(g / DANQ_G);
        document.getElementById('w_nash').value = fix(g / (DIRHAM_G * 20));
        document.getElementById('w_oqia').value = fix(g / 122.472);
        document.getElementById('w_ratl').value = fix(g / RATL_G);
        document.getElementById('w_seer').value = fix(g / SEER_G);
        document.getElementById('w_qirat').value = fix(g / QIRAT_G);
    }

    function updateLength(source) {
        let val = parseFloat(document.getElementById('l_'+source+'_in').value) || 0;
        let cm = 0;
        if(source === 'cm') cm = val;
        else if(source === 'meter') cm = val * 100;
        else if(source === 'inch') cm = val * 2.54;
        else if(source === 'yard') cm = val * YARD_CM;
        else if(source === 'km') cm = val * 100000;
        else if(source === 'mile_m') cm = val * 160934.4;
        else if(source === 'gaz') cm = val * GAZ_CM;
        else if(source === 'arm') cm = val * 45.72;
        else if(source === 'finger') cm = val * 1.905;
        else if(source === 'mile_s') cm = val * SMILE_CM;
        else if(source === 'farsakh') cm = val * (SMILE_CM * 3);
        else if(source === 'bareed') cm = val * (SMILE_CM * 12);
        syncLengths(cm);
    }

    function syncLengths(cm) {
        document.getElementById('l_cm_in').value = fix(cm);
        document.getElementById('l_meter_in').value = fix(cm / 100);
        document.getElementById('l_inch_in').value = fix(cm / 2.54);
        document.getElementById('l_yard_in').value = fix(cm / YARD_CM);
        document.getElementById('l_km_in').value = fix(cm / 100000);
        document.getElementById('l_mile_m_in').value = fix(cm / 160934.4);
        document.getElementById('l_gaz_in').value = fix(cm / GAZ_CM);
        document.getElementById('l_arm_in').value = fix(cm / 45.72);
        document.getElementById('l_finger_in').value = fix(cm / 1.905);
        document.getElementById('l_mile_s_in').value = fix(cm / SMILE_CM);
        document.getElementById('l_farsakh_in').value = fix(cm / (SMILE_CM * 3));
        document.getElementById('l_bareed_in').value = fix(cm / (SMILE_CM * 12));
    }

    function updateCap(source) {
        let val = parseFloat(document.getElementById('c_'+source+'_in').value) || 0;
        let g = 0; 
        if(source === 'gram') g = val;
        else if(source === 'kg') g = val * 1000;
        else if(source === 'saa_h') g = val * 3184.272;
        else if(source === 'mudd_h') g = val * (3184.272 / 4);
        else if(source === 'ratl') g = val * RATL_G;
        else if(source === 'wasq') g = val * (3184.272 * 60);
        else if(source === 'qafiz') g = val * (3184.272 * 12);
        else if(source === 'kur') g = val * (3184.272 * 720);
        else if(source === 'saa_s') g = val * 2012.3;
        else if(source === 'mudd_s') g = val * (2012.3 / 4);
        syncCap(g);
    }

    function syncCap(g) {
        document.getElementById('c_gram_in').value = fix(g);
        document.getElementById('c_kg_in').value = fix(g / 1000);
        document.getElementById('c_saa_h_in').value = fix(g / 3184.272);
        document.getElementById('c_mudd_h_in').value = fix(g / (3184.272 / 4));
        document.getElementById('c_ratl_in').value = fix(g / RATL_G);
        document.getElementById('c_wasq_in').value = fix(g / (3184.272 * 60));
        document.getElementById('c_qafiz_in').value = fix(g / (3184.272 * 12));
        document.getElementById('c_kur_in').value = fix(g / (3184.272 * 720));
        document.getElementById('c_saa_s_in').value = fix(g / 2012.3);
        document.getElementById('c_mudd_s_in').value = fix(g / (2012.3 / 4));
    }

    function fix(v) { return v === 0 ? "" : parseFloat(v.toFixed(6)); }
    function toggleMode() { document.body.classList.toggle('dark-mode'); }
    renderTable();

    // فورا سروس ورکر رجسٹر کریں (Inline Service Worker)
    if ('serviceWorker' in navigator) {
        const swCode = `
            self.addEventListener('install', e => self.skipWaiting());
            self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl);
    }
</script>
